name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  quality:
    name: Ruff and MyPy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: |
          python -m ruff check src tests examples case_studies
          python -m ruff format --check src tests examples case_studies

      - name: Run MyPy
        run: |
          python -m mypy
          python -m mypy case_studies/tennessee_star

      - name: Verify typed public API examples
        run: |
          python -m mypy tests/typecheck/valid_api.py
          if python -m mypy tests/typecheck/invalid_api.py; then
            echo "Expected invalid_api.py to fail MyPy."
            exit 1
          fi

  build:
    name: Build and install wheel
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/fci-wheel-smoke
          wheel="$(find "$GITHUB_WORKSPACE/dist" -name '*.whl' -print -quit)"
          /tmp/fci-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/fci-wheel-smoke/bin/python -m pip install "$wheel"

      - name: Run installed-package smoke test
        working-directory: /tmp
        run: |
          /tmp/fci-wheel-smoke/bin/python - <<'PY'
          import numpy as np
          from fci_engine import fci_plus

          data = np.random.default_rng(0).normal(size=(80, 3))
          result = fci_plus(
              data,
              profile="paper",
              k=1,
              alpha=0.01,
          )
          assert result.algorithm == "fci_plus"
          assert result.graph.nodes == ("X0", "X1", "X2")
          PY
